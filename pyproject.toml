[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "trading-data"
version = "0.1.0"
description = "API-backed source probes and acquisition bundles for trading-data."
requires-python = ">=3.11"
dependencies = [
    "psycopg[binary]>=3.2",
]

[project.scripts]
trading-data-source-availability = "trading_data.source_availability.__main__:main"
trading-data-alpaca-liquidity = "trading_data.data_sources.alpaca_liquidity.__main__:main"
trading-data-okx-crypto-market-data = "trading_data.data_sources.okx_crypto_market_data.__main__:main"
trading-data-source-interfaces = "trading_data.source_interfaces.__main__:main"
trading-data-alpaca-bars = "trading_data.data_sources.alpaca_bars.__main__:main"
trading-data-alpaca-news = "trading_data.data_sources.alpaca_news.__main__:main"
trading-data-sec-company-financials = "trading_data.data_sources.sec_company_financials.__main__:main"
trading-data-gdelt-news = "trading_data.data_sources.gdelt_news.__main__:main"
trading-data-trading-economics-calendar-web = "trading_data.data_sources.trading_economics_calendar_web.__main__:main"
trading-data-etf-holdings = "trading_data.data_sources.etf_holdings.__main__:main"
trading-data-thetadata-option-selection-snapshot = "trading_data.data_sources.thetadata_option_selection_snapshot.__main__:main"
trading-data-thetadata-option-primary-tracking = "trading_data.data_sources.thetadata_option_primary_tracking.__main__:main"
trading-data-thetadata-option-event-timeline = "trading_data.data_sources.thetadata_option_event_timeline.__main__:main"
trading-data-bundle-01-market-regime = "trading_data.data_bundles.bundle_01_market_regime.__main__:main"
trading-data-bundle-02-security-selection = "trading_data.data_bundles.bundle_02_security_selection.__main__:main"
trading-data-bundle-03-strategy-selection = "trading_data.data_bundles.bundle_03_strategy_selection.__main__:main"
trading-data-bundle-05-option-expression = "trading_data.data_bundles.bundle_05_option_expression.__main__:main"
trading-data-bundle-06-position-execution = "trading_data.data_bundles.bundle_06_position_execution.__main__:main"
trading-data-bundle-07-event-overlay = "trading_data.data_bundles.bundle_07_event_overlay.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]
