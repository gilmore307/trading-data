[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "trading-data"
version = "0.1.0"
description = "API-backed source probes and acquisition bundles for trading-data."
requires-python = ">=3.11"
dependencies = []

[project.scripts]
trading-data-source-availability = "trading_data.source_availability.__main__:main"
trading-data-macro-data = "trading_data.data_sources.macro_data.__main__:main"
trading-data-alpaca-quotes-trades = "trading_data.data_sources.alpaca_quotes_trades.__main__:main"
trading-data-source-interfaces = "trading_data.source_interfaces.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]
