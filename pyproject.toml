[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "trading-data"
version = "0.1.0"
description = "API-backed source probes and acquisition bundles for trading-data."
requires-python = ">=3.11"
dependencies = [
    "psycopg[binary]>=3.2",
]

[project.scripts]
trading-data-source-availability = "source_availability.__main__:main"
trading-data-02-source-alpaca-liquidity = "data_sources.02_source_alpaca_liquidity.__main__:main"
trading-data-04-source-okx-crypto-market-data = "data_sources.04_source_okx_crypto_market_data.__main__:main"
trading-data-source-interfaces = "source_interfaces.__main__:main"
trading-data-01-source-alpaca-bars = "data_sources.01_source_alpaca_bars.__main__:main"
trading-data-03-source-alpaca-news = "data_sources.03_source_alpaca_news.__main__:main"
trading-data-08-source-sec-company-financials = "data_sources.08_source_sec_company_financials.__main__:main"
trading-data-05-source-gdelt-news = "data_sources.05_source_gdelt_news.__main__:main"
trading-data-07-source-trading-economics-calendar-web = "data_sources.07_source_trading_economics_calendar_web.__main__:main"
trading-data-06-source-etf-holdings = "data_sources.06_source_etf_holdings.__main__:main"
trading-data-09-source-thetadata-option-selection-snapshot = "data_sources.09_source_thetadata_option_selection_snapshot.__main__:main"
trading-data-10-source-thetadata-option-primary-tracking = "data_sources.10_source_thetadata_option_primary_tracking.__main__:main"
trading-data-11-source-thetadata-option-event-timeline = "data_sources.11_source_thetadata_option_event_timeline.__main__:main"
trading-data-01-bundle-market-regime = "data_bundles.01_bundle_market_regime.__main__:main"
trading-data-02-bundle-security-selection = "data_bundles.02_bundle_security_selection.__main__:main"
trading-data-03-bundle-strategy-selection = "data_bundles.03_bundle_strategy_selection.__main__:main"
trading-data-05-bundle-option-expression = "data_bundles.05_bundle_option_expression.__main__:main"
trading-data-06-bundle-position-execution = "data_bundles.06_bundle_position_execution.__main__:main"
trading-data-07-bundle-event-overlay = "data_bundles.07_bundle_event_overlay.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]
